name: Accessibility Regression Check

on:
  pull_request:

jobs:
  a11y:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: your-org/a11y-diff-action@v1
        with:
          APP_DIR: '.'
          BUILD_DIR: 'dist'
          URLS: '/,/hobbies'