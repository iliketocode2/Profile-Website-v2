name: Accessibility Regression Check

on:
  pull_request:

jobs:
  a11y:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: zachkklein/WCAG_PR_Checker@will-llm
        with:
          APP_DIR: '.'
          BUILD_DIR: '.next/server/app'
          URLS: '/,/projects'